<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login and Table with Index</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
            height: 100vh;
            margin: 0;
        }

        .container {
            display: flex;
            justify-content: center;
            width: 100%;
            height: 100%;
            padding: 20px;
        }

        .left-login {
            width: 320px;
            margin-top: 80px;
            height: 400px   ;
            padding: 20px;
            background-color: white;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }

        .left-login input {
            width: 100%;
            padding: 10px;
            border-radius: 30px;
            font-size: 16px;
            margin-top: 16px;
        }

        .left-login button {
            cursor: pointer;
            color: white;
            background-color: #a995ff;
            width: 100%;
            margin-top: 10px;
            padding: 10px;
            border-radius: 30px;
        }

        .table-container {
            margin-left: 50px;
            margin-top: 80px;
            flex-grow: 1;
            background-color: white;
            padding: 20px;
            box-shadow: 0px 4px 6px rgba(0, 0, 0, 0.1);
            border-radius: 10px;
        }

        .table th, .table td {
            padding: 12px;
            text-align: center;
            vertical-align: middle;
        }

        .table th {
            background-color: #a995ff;
            color: white;
        }

        .table td button {
            background-color: #e74a3b;
            color: white;
            border: none;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 20px;
        }

        .table td button:hover {
            background-color: #c0392b;
        }

        .table td {
            word-wrap: break-word;
        }

        .table-container table {
            width: 100%;
            border-collapse: collapse;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="left-login">
            <h4 class="text-center">Хэрэглэгчийн бүртгэл</h4>
            <input type="text" id="Овог" class="form-control" placeholder="Овог">
            <input type="text" id="Нэр" class="form-control" placeholder="Нэр">
            <input type="number" id="Нас" class="form-control" placeholder="Нас">
            <button class="btn btn-secondary w-100 mt-3" onclick="Нэмэх()">Нэмэх</button>
        </div>

        <div class="table-container">
            <table class="table table-bordered" id="userTable">
                <thead>
                    <tr>
                        <th style="width: 10%;">N%</th>
                        <th style="width: 30%;">Овог</th>
                        <th style="width: 30%;">Нэр</th>
                        <th style="width: 20%;">Нас</th>
                        <th style="width: 10%;">Үйлдэл</th>
                    </tr>
                </thead>
                <tbody>
                </tbody>
            </table>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        let counter = 1;

        function Нэмэх() {
            const овог = document.getElementById("Овог").value;
            const нэр = document.getElementById("Нэр").value;
            const нас = document.getElementById("Нас").value;

            if (овог && нэр && нас) {
                const tr = document.createElement('tr');

                tr.innerHTML = `
                    <td>N%${counter}</td>
                    <td>${овог}</td>
                    <td>${нэр}</td>
                    <td>${нас}</td>
                    <td>
                        <button class="btn btn-danger btn-sm" onclick="устгах(this)">Устгах</button>
                    </td>
                `;

                document.getElementById("userTable").getElementsByTagName("tbody")[0].appendChild(tr);
                counter++;

                document.getElementById('Овог').value = "";
                document.getElementById('Нэр').value = "";
                document.getElementById('Нас').value = "";
            }
        }

        function устгах(Button) {
            if (confirm("Энэ мөрийг устгахдаа итгэлтэй байна уу?")) {
                const row = Button.parentNode.parentNode;
                row.parentNode.removeChild(row);
                updateIndexes();
            }
        }

        function updateIndexes() {
            const rows = document.getElementById("userTable").getElementsByTagName("tbody")[0].rows;
            counter = 1; 
            for (let i = 0; i < rows.length; i++) {
                rows[i].cells[0].innerText = `N%${counter}`;
                counter++;
            }
        }
    </script>
</body>
</html>
